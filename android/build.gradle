
buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 24
        compileSdkVersion = 34
        targetSdkVersion = 35
        ndkVersion = "26.1.10909125"
        kotlinVersion = "1.8.22"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:7.4.2")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
        maven { url("$rootDir/../node_modules/jsc-android/dist") }
        maven { url("$rootDir/../node_modules/react-native/android") }
    }
    
    configurations.all {
        resolutionStrategy {
            force "com.facebook.react:react-android:0.72.6"
            force "androidx.activity:activity:1.8.0"
            force "androidx.activity:activity-ktx:1.8.0"
            
            // Force consistent Kotlin version to avoid duplicate class errors
            force "org.jetbrains.kotlin:kotlin-stdlib:1.8.22"
            force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22"
            force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22"
            
            // Map the old dependency to the new one
            dependencySubstitution {
                substitute module('com.facebook.react:react-native') using module('com.facebook.react:react-android:0.72.6')
                // Map old support library to AndroidX
                substitute module('com.android.support:appcompat-v7') using module('androidx.appcompat:appcompat:1.6.1')
                substitute module('com.android.support:support-v4') using module('androidx.legacy:legacy-support-v4:1.0.0')
                substitute module('com.android.support:recyclerview-v7') using module('androidx.recyclerview:recyclerview:1.3.0')
            }
        }
    }
}
subprojects {
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            project.android {
                compileSdkVersion 34
                buildToolsVersion "34.0.0"
            }
        }
    }
}